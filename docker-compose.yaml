services:
  postgres:
    image: postgres:16
    container_name: atm_postgres
    environment:
      POSTGRES_DB: atm_track
      POSTGRES_USER: aarontran
      POSTGRES_PASSWORD: "${DB_PW}"
    ports:
      - "5432:5432"
    volumes:
      - atm_pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aarontran -d atm_track"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  atm_pgdata: